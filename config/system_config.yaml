# system_config.yaml
topics:
  master2llm:    /cango/master2llm
  llm2master:    /cango/llm2master
  stt_result:    /stt_result
  tts_input:     /cango/master2sound
  sound_trigger: /cango/master2sound
  tts_stop:      /cango/tts_stop

speech:
  language: ko-KR
  energy_threshold: 3000
  pause_threshold: 2.0
  phrase_time_limit: 10

navigation:
  start_position: ""
  map_file: null

llm:
  provider: openai
  model_openai: gpt-4.1-mini-2025-04-14
  model_gemini: gemini-1.5-pro
  max_tokens: 200
  temperature: 0.1

wake_word:
  enabled: false
  keyword: "캔고야"
  sensitivity: 0.8
  timeout_sec: 10
  confirm_sound: false

emergency_keywords:
  - 정지
  - 멈춰
  - 위험
  - 스톱

robot_commands:
  stop: "STOP"
  resume: "RESUME"
  return_to_start: "RETURN_TO_START"
  set_destination: "NAVIGATE:{node_id}"
  change_direction: "DIRECTION:{direction}"

rosbridge:
  host: '100.95.77.76'
  port: 9090
